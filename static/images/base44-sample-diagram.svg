</defs><rect width="1240" height="900" rx="26" fill="url(#canvas)"/><rect x="14" y="14" width="1212" height="872" rx="22" fill="none" stroke="#DCE4F1" stroke-width="2"/><line x1="600" y1="40" x2="600" y2="860" stroke="#E1E8F3" stroke-width="2" stroke-dasharray="2 10"/><text x="56" y="70" class="sec">기존 방식</text><text x="56" y="108" class="ttl">래퍼(껍데기)</text><g filter="url(#sh)"><rect x="80" y="156" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="212" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-cloud" x="108" y="188" width="48" height="48"/><text x="176" y="206" class="bt">남의 뇌를 빌림</text><text x="176" y="232" class="bs">요청을 대형 모델 API로 전송</text><path d="M300 268V306" stroke="#70829F" stroke-width="2.5" marker-end="url(#arw)"/><g filter="url(#sh)"><rect x="80" y="306" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="362" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-warning" x="108" y="338" width="48" height="48"/><text x="176" y="356" class="bt">해자 없음</text><text x="176" y="382" class="bs">가격·정책 변동에 취약</text><path d="M300 418V456" stroke="#70829F" stroke-width="2.5" marker-end="url(#arw)"/><g filter="url(#sh)"><rect x="80" y="456" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="512" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-link" x="108" y="488" width="48" height="48"/><text x="176" y="506" class="bt">대체당할 위험</text><text x="176" y="532" class="bs">다음 업데이트 한 방에 소멸</text><rect x="190" y="632" width="220" height="60" rx="15" fill="#FFECEE" stroke="#E6B7C2"/><text x="300" y="670" text-anchor="middle" class="ft" fill="#8B4B5B">땅 주인이 나가라면 끝</text><text x="300" y="724" text-anchor="middle" class="nt">화려한 성이지만 남의 땅 위에 지음</text><text x="656" y="70" class="sec">새 방식</text><text x="656" y="108" class="ttl">자체 모델(Base1)</text><g filter="url(#sh)"><rect x="6