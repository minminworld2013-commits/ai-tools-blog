</defs><rect width="1240" height="900" rx="26" fill="url(#canvas)"/><rect x="14" y="14" width="1212" height="872" rx="22" fill="none" stroke="#DCE4F1" stroke-width="2"/><line x1="600" y1="40" x2="600" y2="860" stroke="#E1E8F3" stroke-width="2" stroke-dasharray="2 10"/><text x="56" y="70" class="sec">흔한 오해</text><text x="56" y="108" class="ttl">만능 편집기로 &#x27;대체&#x27;</text><g filter="url(#sh)"><rect x="80" y="156" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="212" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-monitor" x="108" y="188" width="48" height="48"/><text x="176" y="206" class="bt">워크플로 전체 대체 기대</text><text x="176" y="232" class="bs">RAW현상·컬링·DAM까지</text><path d="M300 268V306" stroke="#70829F" stroke-width="2.5" marker-end="url(#arw)"/><g filter="url(#sh)"><rect x="80" y="306" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="362" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-warning" x="108" y="338" width="48" height="48"/><text x="176" y="356" class="bt">강하게 밀어붙임</text><text x="176" y="382" class="bs">샤프닝·업스케일 과잉</text><path d="M300 418V456" stroke="#70829F" stroke-width="2.5" marker-end="url(#arw)"/><g filter="url(#sh)"><rect x="80" y="456" width="440" height="112" rx="16" fill="url(#card)" stroke="#D5DEEA"/></g><circle cx="132" cy="512" r="26" fill="#EAF1FF" stroke="#C9D8F1" stroke-width="1.4"/><use href="#ic-gear" x="108" y="488" width="48" height="48"/><text x="176" y="506" class="bt">결과: 플라스틱 질감</text><text x="176" y="532" class="bs">사진이 일러스트처럼</text><rect x="190" y="632" width="220" height="60" rx="15" fill="#FFECEE" stroke="#E6B7C2"/><text x="300" y="670" text-anchor="middle" class="ft" fill="#8B4B5B">대신하려 들면 반드시 실망</text><text x="300" y="724" text-anchor="middle" class="nt">Lightroom·Capture One은 대체 못 함</text><text x="656" y="70" class="sec">제대로 쓰기</text><text x="656" y="108" class="ttl">특수 도구로 &#x27;더하기